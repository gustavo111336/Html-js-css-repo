
<!DOCTYPE html>

  <style>
/* Isso faz com que o HTML entenda os "Enters" vindos do YAML */
#app-mount p, .descricao {
    white-space: pre-wrap;
}
/* Container para organizar os cards */
.container-cards {
    display: flex;
    flex-direction: column; /* Um embaixo do outro */
    gap: 15px;              /* Espaço entre os cards */
    padding: 20px;
}

/* O Estilo do Card */
.card {
    background: #ffffff;
    border: 1px solid #e1e4e8;
    border-radius: 12px;
    padding: 16px;
    text-decoration: none;
    color: #333;
    display: block;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    transition: transform 0.2s, box-shadow 0.2s;
}

/* Efeito ao passar o mouse ou clicar */
.card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    border-color: #007bff;
}

.card-content strong {
    display: block;
    font-size: 1.1rem;
    margin-bottom: 4px;
    color: #007bff;
}

.card-content span {
    font-size: 0.85rem;
    color: #666;
}
